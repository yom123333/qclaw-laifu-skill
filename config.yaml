# 来福策略工具箱 — 用户配置
# 首次使用请填写以下配置

# DeepSeek API（用于复盘摘要等AI功能）
deepseek:
  api_key: "sk-your-key-here"
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"

# 通达信数据路径
tdx:
  vipdoc_path: "C:\\zd_zsone\\T0002\\vipdoc"  # 修改为你的通达信安装路径

# 策略预设（可自定义参数）
strategy:
  longhui:
    # 龙回2号入场过滤
    time_window_min: 3       # 涨停后最小天数
    time_window_max: 12      # 涨停后最大天数
    shrink_ratio_min: 0.25   # 最小缩量比
    shrink_ratio_max: 0.55   # 最大缩量比
    price_discount: 0.98     # 价格底线折扣
    ma_trend: 20             # MA趋势周期
    ang3_min: 0              # 3日角度最低
    deviation_wc: 0.5        # 偏离度弱系数
    deviation_tc: 0.3        # 偏离度趋势系数
    deviation_vc: 0.2        # 偏离度波动系数
    stop_daily_loss: -0.03   # 日跌幅上限
    market_green_light: 50   # 大盘绿灯最低评分
    # 出场规则
    exit_atr_multiplier: 2.0
    exit_bollinger_sigma: 2.0
    exit_shrink_angle: -0.5
    exit_volume_ratio: 2.0
    exit_trendline_atr: 2.0
    exit_cooling_days: 5

  attack_defend:
    # 攻守双驱V1
    momentum_window: 20      # 动量计算窗口
    lowvol_window: 60        # 低波计算窗口
    rebalance_days: 20       # 换仓周期

# 预警设置
alerts:
  enable_exit: true          # 出场触发预警
  enable_entry: true         # 新信号预警
  enable_market: true        # 市场极端波动预警
  tts_enabled: false         # 语音播报

# 回测设置
backtest:
  start_date: "2015-01-01"
  end_date: "2025-12-31"
  capital: 1000000           # 初始资金
  commission: 0.0003         # 手续费率
  slippage: 0.001            # 滑点
